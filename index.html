<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ujian Madrasah Diniyyah Nurul Yusuf</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <style>
        :root { --primary: #1b5e20; --secondary: #2e7d32; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background: var(--bg); color: #333; }
        .container { max-width: 700px; margin: 30px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .hidden { display: none; }
        h2, h3 { color: var(--primary); text-align: center; }
        .btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .btn:hover { background: var(--secondary); }
        .btn-alt { background: #0277bd; } .btn-alt:hover { background: #01579b; }
        input, select { width: 100%; padding: 12px; margin: 10px 0 20px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .soal-card { background: #fafafa; border-left: 5px solid var(--primary); padding: 15px; margin-bottom: 20px; border-radius: 4px; }
        .opsi-container { margin-top: 10px; }
        .opsi-container label { display: block; padding: 8px; background: #fff; border: 1px solid #ddd; margin-bottom: 5px; border-radius: 4px; cursor: pointer; }
        .opsi-container input { width: auto; margin-right: 10px; }
        #timerDisplay { font-size: 24px; font-weight: bold; color: #c62828; text-align: center; margin-bottom: 20px; }
        .no-select { user-select: none; -webkit-user-select: none; -moz-user-select: none; }
    </style>
</head>
<body class="no-select" oncontextmenu="return false;">

<div class="container" id="loginArea">
    <h2>Madrasah Diniyyah Nurul Yusuf</h2>
    <p style="text-align:center; color:#666;"> Ujian Harian</p>
    <div class="nav-tabs">
        <button class="btn" onclick="switchTab('santri')">Santri</button>
        <button class="btn btn-alt" onclick="switchTab('guru')">Guru</button>
    </div>

    <div id="santriForm">
        <h3>Masuk</h3>
        <label>Nama Lengkap Santri:</label>
        <input type="text" id="namaSantri" placeholder="Masukkan nama lengkap...">
        <label>Tingkatan Kelas:</label>
        <select id="kelasSantri" onchange="loadMapelAktif()">
            <option value="">Pilih Tingkatan...</option>
            <option value="1 Ula">1 Ula</option>
            <option value="2 Ula">2 Ula</option>
            <option value="3 Ula">3 Ula</option>
            <option value="4 Ula">4 Ula</option>
            <option value="5 Ula">5 Ula</option>
            <option value="6 Ula">6 Ula</option>
        </select>
        <label>Mata Pelajaran:</label>
        <select id="mapelSantri">
            <option value="">Pilih Tingkatan Kelas Terlebih Dahulu...</option>
        </select>
        <button class="btn" onclick="validasiDanMulaiUjian()">Mulai Ujian Sekarang</button>
    </div>

    <div id="guruForm" class="hidden">
        <h3>Autentikasi Guru</h3>
        <label>Password:</label>
        <input type="password" id="passGuru" placeholder="Masukkan password...">
        <button class="btn btn-alt" onclick="loginGuru()">Masuk Dasbor</button>
    </div>
</div>

<div class="container hidden" id="dashboardGuru">
    <h2>Dasbor Manajemen Ujian</h2>
    <hr>
    <h3>1. Unggah Berkas Soal (.docx)</h3>
    <input type="file" id="fileSoal" accept=".docx">
    <button class="btn btn-alt" onclick="prosesDocx()">Proses & Sinkronisasi Database</button>
    <div id="hasilParse" style="margin-top:10px; font-weight:bold; color: var(--secondary); text-align:center;"></div>
</div>

<div class="container hidden" id="areaUjian">
    <div id="timerDisplay">00:00</div>
    <div id="boxSoal"></div>
    <button class="btn" id="btnSubmitUjian" onclick="selesaiUjian(false)">Kumpulkan & Selesai</button>
</div>

<script>
    // GANTI DENGAN URL WEB APP GOOGLE APPS SCRIPT ANDA
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxa5okLYrXD8_UMQcNY3yeERLGxmHZXAa6_rDyI1IQbla3F37C5Q51IPd1_cG0mZqTN/exec'; 

    let listSemuaSoal = [];
    let configUjian = {};
    let jumlahPelanggaran = 0;
    let ujianAktif = false;
    let countdownInterval;
    let waktuTersisa = 0;
    let indeksPerSoal = 0;
    let dataMapelGlobal = [];

    // Mengambil daftar mata pelajaran aktif berdasarkan database secara berkala
    window.onload = function() {
        fetch(GAS_URL + '?action=getMapelList')
        .then(r => r.json())
        .then(data => { dataMapelGlobal = data; })
        .catch(e => console.log("Gagal memuat daftar mapel"));
    };

    function loadMapelAktif() {
        const kelas = document.getElementById('kelasSantri').value;
        const selectMapel = document.getElementById('mapelSantri');
        selectMapel.innerHTML = '<option value="">Pilih Mapel...</option>';
        const terfilter = dataMapelGlobal.filter(d => d.kelas === kelas);
        
        // Buat daftar unik
        const unikMapel = [...new Set(terfilter.map(item => item.mapel))];
        unikMapel.forEach(m => {
            selectMapel.innerHTML += `<option value="${m}">${m}</option>`;
        });
    }

    function switchTab(tipe) {
        if(tipe === 'santri') {
            document.getElementById('santriForm').classList.remove('hidden');
            document.getElementById('guruForm').classList.add('hidden');
        } else {
            document.getElementById('guruForm').classList.remove('hidden');
            document.getElementById('santriForm').classList.add('hidden');
        }
    }

    function loginGuru() {
        const pass = document.getElementById('passGuru').value;
        fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'loginAdmin', password: pass })
        })
        .then(r => r.json())
        .then(res => {
            if(res.status === 'success') {
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('dashboardGuru').classList.remove('hidden');
                fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'setup' })});
            } else {
                alert(res.message);
            }
        });
    }

    function prosesDocx() {
        const fileInput = document.getElementById("fileSoal");
        if(fileInput.files.length === 0) return alert("Pilih file .docx!");
        
        document.getElementById('hasilParse').innerText = "Sedang membaca file...";
        const reader = new FileReader();
        reader.onload = function(e) {
            mammoth.extractRawText({ arrayBuffer: e.target.result })
            .then(function(result) {
                parseTeksSoal(result.value);
            });
        };
        reader.readAsArrayBuffer(fileInput.files[0]);
    }

    function parseTeksSoal(text) {
        const lines = text.split('\n').map(l => l.trim()).filter(l => l !== "");
        let guru = "", mapel = "", kelas = "";
        let soalArr = [];
        let itemSkg = null;

        lines.forEach(line => {
            if(line.startsWith("Guru:")) guru = line.split(":")[1].trim();
            else if(line.startsWith("Mapel:")) mapel = line.split(":")[1].trim();
            else if(line.startsWith("Kelas:")) kelas = line.split(":")[1].trim();
            else if(line.startsWith("Pertanyaan:")) {
                itemSkg = { pertanyaan: line.split(":")[1].trim() };
            }
            else if(line.startsWith("A:")) if(itemSkg) itemSkg.a = line.split(":")[1].trim();
            else if(line.startsWith("B:")) if(itemSkg) itemSkg.b = line.split(":")[1].trim();
            else if(line.startsWith("C:")) if(itemSkg) itemSkg.c = line.split(":")[1].trim();
            else if(line.startsWith("D:")) if(itemSkg) itemSkg.d = line.split(":")[1].trim();
            else if(line.startsWith("Kunci:")) {
                if(itemSkg) { itemSkg.kunci = line.split(":")[1].trim(); }
            }
            else if(line === "===") {
                if(itemSkg) { soalArr.push(itemSkg); itemSkg = null; }
            }
        });

        if(!guru || !mapel || !kelas || soalArr.length === 0) {
            document.getElementById('hasilParse').innerText = "Format berkas salah atau data kosong!";
            return;
        }

        // Simpan Konfigurasi & Soal ke Google Sheets
        fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'simpanPengaturan', guru: guru, mapel: mapel, kelas: kelas, maxCurang: 2, waktuUjian: 60, tipeTimer: 'total' })
        }).then(() => {
            return fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'simpanSoal', guru: guru, mapel: mapel, kelas: kelas, soal: soalArr })
            });
        }).then(r => r.json())
        .then(res => {
            document.getElementById('hasilParse').innerText = `Sukses memasukkan ${res.count} soal ke database!`;
        });
    }

    function validasiDanMulaiUjian() {
        const nama = document.getElementById('namaSantri').value;
        const kelas = document.getElementById('kelasSantri').value;
        const mapel = document.getElementById('mapelSantri').value;

        if(!nama || !kelas || !mapel) return alert("Harap lengkapi seluruh kolom login!");

        fetch(`${GAS_URL}?action=getUjian&kelas=${encodeURIComponent(kelas)}&mapel=${encodeURIComponent(mapel)}`)
        .then(r => r.json())
        .then(res => {
            if(res.soal.length === 0) return alert("Soal belum tersedia untuk kelas/mapel ini.");
            listSemuaSoal = res.soal;
            configUjian = res.config;
            initUjian();
        });
    }

    function initUjian() {
        document.getElementById('loginArea').classList.add('hidden');
        document.getElementById('areaUjian').classList.remove('hidden');

        // Memicu Sistem Layar Penuh (Proteksi Dasar)
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();

        ujianAktif = true;
        jumlahPelanggaran = 0;

        // Atur Proteksi Salin-Tempel (Anti-Copas)
        document.addEventListener('copy', tangkisAksi);
        document.addEventListener('paste', tangkisAksi);
        document.addEventListener('cut', tangkisAksi);

        if(configUjian.tipeTimer === 'total') {
            waktuTersisa = configUjian.waktuUjian * 60;
            renderSemuaSoal();
            mulaiTimerGlobal();
        } else {
            waktuTersisa = configUjian.waktuUjian; // waktu per soal (detik)
            indeksPerSoal = 0;
            renderSatuSoal();
            mulaiTimerPerSoal();
        }
    }

    function tangkisAksi(e) { e.preventDefault(); alert("Fitur keamanan melarang aksi menyalin/menempel teks!"); }

    // Deteksi Berpindah Tab/Layar Mengambang/Aplikasi Belah Layar
    window.addEventListener('blur', laporCurang);
    document.addEventListener('visibilitychange', () => { if(document.hidden) laporCurang(); });

    function laporCurang() {
        if(!ujianAktif) return;
        jumlahPelanggaran++;
        if(jumlahPelanggaran > configUjian.maxCurang) {
            ujianAktif = false;
            clearInterval(countdownInterval);
            alert("Anda otomatis dikeluarkan dari sistem karena terdeteksi curang melampaui batas batas toleransi.");
            selesaiUjian(true); // Kirim status gagal/gugur
        } else {
            alert(`PERINGATAN KECURANGAN! Jangan keluar dari tampilan aplikasi ujian. Peringatan ke-${jumlahPelanggaran} dari ${configUjian.maxCurang}.`);
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        }
    }

    function mulaiTimerGlobal() {
        countdownInterval = setInterval(() => {
            let m = Math.floor(waktuTersisa / 60); let s = waktuTersisa % 60;
            document.getElementById('timerDisplay').innerText = `${m < 10 ? '0':''}${m}:${s < 10 ? '0':''}${s}`;
            if(waktuTersisa <= 0) { clearInterval(countdownInterval); selesaiUjian(false); }
            waktuTersisa--;
        }, 1000);
    }

    function mulaiTimerPerSoal() {
        countdownInterval = setInterval(() => {
            document.getElementById('timerDisplay').innerText = `Sisa Waktu Soal: ${waktuTersisa} Detik`;
            if(waktuTersisa <= 0) {
                simpanJawabanPerSoalLokal();
                if(indeksPerSoal < listSemuaSoal.length - 1) {
                    indeksPerSoal++;
                    waktuTersisa = configUjian.waktuUjian;
                    renderSatuSoal();
                } else {
                    clearInterval(countdownInterval);
                    selesaiUjian(false);
                }
            }
            waktuTersisa--;
        }, 1000);
    }

    function renderSemuaSoal() {
        const box = document.getElementById('boxSoal');
        box.innerHTML = '';
        listSemuaSoal.forEach((s, idx) => {
            box.innerHTML += `
                <div class="soal-card">
                    <p><b>Soal ${idx+1}.</b> ${s.pertanyaan}</p>
                    <div class="opsi-container">
                        <label><input type="radio" name="soal_${s.id}" value="A"> A. ${s.a}</label>
                        <label><input type="radio" name="soal_${s.id}" value="B"> B. ${s.b}</label>
                        <label><input type="radio" name="soal_${s.id}" value="C"> C. ${s.c}</label>
                        <label><input type="radio" name="soal_${s.id}" value="D"> D. ${s.d}</label>
                    </div>
                </div>`;
        });
    }

    function renderSatuSoal() {
        const box = document.getElementById('boxSoal');
        const s = listSemuaSoal[indeksPerSoal];
        document.getElementById('btnSubmitUjian').classList.add('hidden'); // Sembunyikan tombol utama
        box.innerHTML = `
            <div class="soal-card">
                <p><b>Soal ${indeksPerSoal+1} dari ${listSemuaSoal.length}.</b> ${s.pertanyaan}</p>
                <div class="opsi-container" id="opsiKini">
                    <label><input type="radio" name="soal_tunggal" value="A"> A. ${s.a}</label>
                    <label><input type="radio" name="soal_tunggal" value="B"> B. ${s.b}</label>
                    <label><input type="radio" name="soal_tunggal" value="C"> C. ${s.c}</label>
                    <label><input type="radio" name="soal_tunggal" value="D"> D. ${s.d}</label>
                </div>
                <button class="btn" onclick="pindahSoalManual()">Lanjut Soal</button>
            </div>`;
    }

    let jawabanLokalPerSoal = {};
    function simpanJawabanPerSoalLokal() {
        const dipilih = document.querySelector('input[name="soal_tunggal"]:checked');
        if(dipilih) {
            jawabanLokalPerSoal[listSemuaSoal[indeksPerSoal].id] = dipilih.value;
        }
    }

    function pindahSoalManual() {
        simpanJawabanPerSoalLokal();
        if(indeksPerSoal < listSemuaSoal.length - 1) {
            indeksPerSoal++;
            waktuTersisa = configUjian.waktuUjian;
            renderSatuSoal();
        } else {
            clearInterval(countdownInterval);
            selesaiUjian(false);
        }
    }

    function selesaiUjian(gugurOtomatis) {
        ujianAktif = false;
        clearInterval(countdownInterval);
        
        let skor = 0;
        let statusKelulusan = gugurOtomatis ? "GUGUR (KECURANGAN)" : "SELESAI";

        if(!gugurOtomatis) {
            let jumlahBenar = 0;
            listSemuaSoal.forEach(s => {
                let jwbSiswa = "";
                if(configUjian.tipeTimer === 'total') {
                    const r = document.querySelector(`input[name="soal_${s.id}"]:checked`);
                    if(r) jwbSiswa = r.value;
                } else {
                    jwbSiswa = jawabanLokalPerSoal[s.id] || "";
                }
                if(jwbSiswa === s.kunci) jumlahBenar++;
            });
            skor = Math.round((jumlahBenar / listSemuaSoal.length) * 100);
        }

        const payload = {
            action: 'simpanNilai',
            nama: document.getElementById('namaSantri').value,
            kelas: document.getElementById('kelasSantri').value,
            mapel: document.getElementById('mapelSantri').value,
            skor: skor,
            status: statusKelulusan
        };

        fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })
        .then(() => {
            alert(`Proses Ujian Selesai. Hasil telah disimpan.`);
            if (document.exitFullscreen) document.exitFullscreen();
            location.reload();
        });
    }
</script>
</body>
</html>
